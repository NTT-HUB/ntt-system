<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Key - NTT System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00ff9d; --primary-dark: #00cc7d;
      --bg-dark: #0a0e1a; --bg-darker: #050810;
      --surface: #141824; --text: #e8ecf5; --text-dim: #8892ab;
      --border: #1f2937; --success: #00ff9d; --error: #ff4d6d;
    }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg-dark); color: var(--text);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem;
    }
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px; z-index: 0; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: up 0.5s ease;
    }
    @keyframes up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .title {
      font-family: 'Oswald', sans-serif; font-size: 1.75rem;
      text-align: center; margin-bottom: 0.35rem;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 2rem; }
    .step-block { display: none; margin-bottom: 0.75rem; animation: up 0.4s ease; }
    .step-block.show { display: block; }
    .btn {
      width: 100%; padding: 1rem; border: none; border-radius: 10px;
      font-family: 'Oswald', sans-serif; font-size: 1rem;
      font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s; text-decoration: none;
      display: block; text-align: center;
    }
    .btn-start { background: linear-gradient(135deg, var(--primary), #00cc7d); color: var(--bg-dark); }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,157,0.35); }
    .btn-step { background: rgba(0,255,157,0.08); border: 1px solid rgba(0,255,157,0.25); color: var(--primary); }
    .btn-step:hover { background: rgba(0,255,157,0.15); transform: translateY(-2px); }
    .btn-generate { background: linear-gradient(135deg, var(--primary), #6366f1); color: var(--bg-dark); }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,157,0.3); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .key-result { display: none; animation: up 0.4s ease; text-align: center; }
    .key-result.show { display: block; }
    .key-box { background: var(--bg-darker); border: 1px solid var(--success); border-radius: 10px; padding: 1.5rem 1rem; margin-bottom: 0.75rem; }
    .key-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.75rem; }
    .key-value { font-size: 1.3rem; font-weight: 700; color: var(--success); word-break: break-all; line-height: 1.4; }
    .btn-copy { width: 100%; padding: 0.875rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; cursor: pointer; transition: all 0.25s; }
    .btn-copy:hover { border-color: var(--primary); color: var(--primary); }
    .error-msg { display: none; margin-top: 0.75rem; padding: 0.75rem 1rem; background: rgba(255,77,109,0.1); border: 1px solid var(--error); border-radius: 8px; font-size: 0.8rem; color: var(--error); text-align: center; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="card">
    <h1 class="title">Get Your Key</h1>
    <p class="subtitle" id="domainLabel">Loading...</p>
    <p style="text-align:center;font-size:0.7rem;color:var(--text-dim);margin-bottom:1rem;word-break:break-all;" id="hwidDisplay"></p>

    <div class="step-block" id="blockStart">
      <a href="#" class="btn btn-start" id="btnStart" target="_blank">▶ Start</a>
    </div>
    <div class="step-block" id="blockStep1">
      <button class="btn btn-step" id="btnStep1">Step 1</button>
    </div>
    <div class="step-block" id="blockStep2">
      <button class="btn btn-step" id="btnStep2">Step 2</button>
    </div>
    <div class="step-block" id="blockGenerate">
      <button class="btn btn-generate" id="btnGenerate">Generate Key</button>
    </div>

    <div class="key-result" id="keyResult">
      <div class="key-box">
        <div class="key-label">Your Key</div>
        <div class="key-value" id="keyValue"></div>
      </div>
      <button class="btn-copy" id="btnCopy">Copy Key</button>
      <div id="keyExpiry" style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-dim);text-align:center;font-family:'IBM Plex Mono',monospace;">
        ⏱ Expires in <span id="expiryTime">--:--:--</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script type="module">
    import API_BASE from './api-base.js';

    const urlParams    = new URLSearchParams(window.location.search);
    const hash         = urlParams.get('hash') || '';
    const hasValidHash = hash.length > 10;

    // Domain từ URL hoặc localStorage
    let domain = urlParams.get('domain') || urlParams.get('id') || localStorage.getItem('ntt_domain') || '';

    // Chỉ là callback khi CÓ hash hợp lệ VÀ có param step
    const hasStartParam = urlParams.has('start_done') || urlParams.has('start');
    const hasStep1Param = urlParams.has('step1_done') || urlParams.has('step1');
    const hasStep2Param = urlParams.has('step2_done') || urlParams.has('step2');
    const isCallback    = hasValidHash && (hasStartParam || hasStep1Param || hasStep2Param);

    let settings = null;

    // Chỉ dùng hwid từ URL — phải do Roblox script truyền vào
    const hwidFromUrl = urlParams.get('hwid') || '';
    let hwid = (hwidFromUrl && hwidFromUrl.length <= 50 && hwidFromUrl !== '{your_hwid}' && hwidFromUrl.trim() !== '')
      ? hwidFromUrl.trim()
      : null;

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
    }

    function show(id) {
      const el = document.getElementById(id);
      el.style.display = '';
      el.classList.add('show');
    }

    function hide(id) {
      const el = document.getElementById(id);
      el.classList.remove('show');
      el.style.display = '';
    }

    function resetBlocks() {
      ['blockStart','blockStep1','blockStep2','blockGenerate'].forEach(id => hide(id));
    }

    async function loadSettings() {
      if (!domain) { showError('No domain specified.'); return; }
      try {
        const res  = await fetch(`${API_BASE}/?type=get_settings_by_domain&domain=${encodeURIComponent(domain)}`);
        const data = await res.json();
        if (!data.success) { showError('Domain not found.'); return; }

        settings = data.settings;
        document.getElementById('domainLabel').textContent = settings.website_domain;
        document.getElementById('hwidDisplay').textContent = hwid ? `HWID: ${hwid}` : 'No HWID provided';
        document.getElementById('btnStart').href = settings.start_link;

        hwid = hwid || localStorage.getItem('ntt_hwid');
        if (!hwid) {
          showError('Missing HWID. Use: /key.html?domain=xxx&hwid=YOUR_HWID');
          return;
        }
        localStorage.setItem('ntt_hwid', hwid);

        resetBlocks();
        show('blockStart');

        await renderProgress();
        setInterval(renderProgress, 4000);
      } catch { showError('Failed to load.'); }
    }

    async function renderProgress() {
      if (!hwid || !settings) return;

      const savedKey    = localStorage.getItem('ntt_generated_key');
      const savedDomain = localStorage.getItem('ntt_key_domain');
      const savedHwid   = localStorage.getItem('ntt_key_hwid');
      if (savedKey && savedDomain === domain && savedHwid === hwid) {
        await showKey(savedKey); return;
      }
      // Khác hwid → xóa key cũ
      if (savedKey && savedHwid !== hwid) {
        localStorage.removeItem('ntt_generated_key');
        localStorage.removeItem('ntt_key_domain');
        localStorage.removeItem('ntt_key_hwid');
        localStorage.removeItem('ntt_key_expiry');
      }

      try {
        const res  = await fetch(`${API_BASE}/?type=progress&hwid=${encodeURIComponent(hwid)}`);
        const data = await res.json();

        resetBlocks();

        if (!data.status) {
          show('blockStart');
          return;
        }

        if (data.step1) {
          if (settings.ad_steps === 2 && !data.step2) {
            show('blockStep2');
          } else {
            show('blockGenerate');
          }
        } else if (data.start) {
          show('blockStep1');
        } else {
          show('blockStart');
        }
      } catch {}
    }

    let countdownInterval = null;

    function startCountdown(secondsLeft) {
      if (countdownInterval) clearInterval(countdownInterval);
      const el = document.getElementById('expiryTime');
      function tick() {
        if (secondsLeft <= 0) {
          el.textContent = 'Expired';
          clearInterval(countdownInterval);
          localStorage.removeItem('ntt_generated_key');
          localStorage.removeItem('ntt_key_domain');
          localStorage.removeItem('ntt_key_hwid');
          localStorage.removeItem('ntt_key_expiry');
          return;
        }
        const h = Math.floor(secondsLeft / 3600);
        const m = Math.floor((secondsLeft % 3600) / 60);
        const s = secondsLeft % 60;
        el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        secondsLeft--;
      }
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    async function showKey(key, secondsLeft) {
      resetBlocks();
      document.getElementById('keyValue').textContent = key;
      document.getElementById('keyResult').classList.add('show');

      if (secondsLeft !== undefined) {
        startCountdown(secondsLeft);
      } else {
        // Fetch time còn lại từ KV
        try {
          const r = await fetch(`${API_BASE}/?type=read&hwid=${encodeURIComponent(hwid)}`);
          const d = await r.json();
          startCountdown(d.left || 0);
        } catch {
          startCountdown(0);
        }
      }
    }

    document.getElementById('btnStart').addEventListener('click', () => {
      localStorage.setItem('ntt_domain', domain);
      if (hwid) localStorage.setItem('ntt_hwid', hwid);
    });

    document.getElementById('btnStep1').addEventListener('click', () => {
      if (!settings?.step1_link) return;
      localStorage.setItem('ntt_domain', domain);
      localStorage.setItem('ntt_hwid', hwid);
      window.open(settings.step1_link, '_blank');
    });

    document.getElementById('btnStep2').addEventListener('click', () => {
      if (!settings?.step2_link) return;
      localStorage.setItem('ntt_domain', domain);
      localStorage.setItem('ntt_hwid', hwid);
      window.open(settings.step2_link, '_blank');
    });

    document.getElementById('btnGenerate').addEventListener('click', async () => {
      const btn = document.getElementById('btnGenerate');
      btn.disabled = true; btn.textContent = 'Generating...';
      try {
        const res  = await fetch(`${API_BASE}/?type=create_key`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hwid, domain: settings.website_domain, key_prefix: settings.key_domain }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('ntt_generated_key', data.key);
          localStorage.setItem('ntt_key_domain', domain);
          localStorage.setItem('ntt_key_hwid', hwid);
          localStorage.removeItem('ntt_key_expiry');
          localStorage.removeItem('ntt_domain');
          localStorage.removeItem('ntt_hwid');
          await showKey(data.key, data.expires_in || 86400);
        } else {
          showError(data.error || 'Failed.');
          btn.disabled = false; btn.textContent = 'Generate Key';
        }
      } catch {
        showError('Connection error.');
        btn.disabled = false; btn.textContent = 'Generate Key';
      }
    });

    document.getElementById('btnCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('keyValue').textContent).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.textContent = 'Copy Key'; }, 2000);
      });
    });

    async function completeStep(step) {
      try {
        const res = await fetch(`${API_BASE}/?type=complete_step`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hwid, step, hash, domain }),
        });
        return (await res.json()).success;
      } catch { return false; }
    }

    async function init() {
      if (isCallback) {
        // Callback từ Linkvertise — có hash hợp lệ
        domain = urlParams.get('domain') || localStorage.getItem('ntt_domain') || '';
        hwid   = localStorage.getItem('ntt_hwid');

        if (!domain) { showError('Session lost. Please start over.'); return; }

        localStorage.setItem('ntt_domain', domain);
        localStorage.setItem('ntt_hwid',   hwid);

        const step = hasStartParam ? 'start' : hasStep1Param ? 1 : 2;
        await completeStep(step);
        window.location.replace(`/key.html?domain=${encodeURIComponent(domain)}`);
        return;
      }

      // Normal load
      if (urlParams.get('domain')) localStorage.setItem('ntt_domain', domain);

      if (!domain) { showError('No domain specified.'); return; }

      // Hiện key cũ nếu còn hợp lệ
      const savedKey    = localStorage.getItem('ntt_generated_key');
      const savedDomain = localStorage.getItem('ntt_key_domain');
      const savedHwid   = localStorage.getItem('ntt_key_hwid');

      const curHwid = hwid || localStorage.getItem('ntt_hwid') || null;
      hwid = curHwid;

      // Nếu domain hoặc hwid khác → xóa key cũ ngay
      if (savedKey && (savedDomain !== domain || savedHwid !== curHwid)) {
        localStorage.removeItem('ntt_generated_key');
        localStorage.removeItem('ntt_key_domain');
        localStorage.removeItem('ntt_key_hwid');
        localStorage.removeItem('ntt_key_expiry');
      }

      // Đúng domain + đúng hwid → hiện key cũ
      if (savedKey && savedDomain === domain && savedHwid === curHwid) {
        document.getElementById('domainLabel').textContent = domain;
        await showKey(savedKey);
        return;
      }

      await loadSettings();
    }

    init();
  </script>
</body>
</html>
