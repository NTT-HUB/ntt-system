<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Key - NTT System</title>
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://ntt-system.xyz/">
  <meta property="og:site_name"    content="NTT System">
  <meta property="og:title"        content="NTT System — Key Generator Platform">
  <meta property="og:description"  content="Anti-bypass key authentication platform powered by Linkvertise. Easy setup, high security — ready to use in your scripts.">
  <meta property="og:image"        content="https://raw.githubusercontent.com/NTT-HUB/image/refs/heads/main/logo/Screenshot%202026-04-19%20212606.png">
  <meta property="og:image:width"  content="905">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="NTT System — Key Generator Platform">
  <meta name="twitter:description" content="Anti-bypass key authentication platform powered by Linkvertise.">
  <meta name="twitter:image"       content="https://raw.githubusercontent.com/NTT-HUB/image/refs/heads/main/logo/Screenshot%202026-04-19%20212606.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00ff9d; --primary-dark: #00cc7d;
      --bg-dark: #0a0e1a; --bg-darker: #050810;
      --surface: #141824; --text: #e8ecf5; --text-dim: #8892ab;
      --border: #1f2937; --success: #00ff9d; --error: #ff4d6d;
    }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg-dark); color: var(--text);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem;
    }
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px; z-index: 0; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: up 0.5s ease;
    }
    @keyframes up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .title {
      font-family: 'Oswald', sans-serif; font-size: 1.75rem;
      text-align: center; margin-bottom: 0.35rem;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 2rem; }
    .step-block { display: none; margin-bottom: 0.75rem; animation: up 0.4s ease; }
    .step-block.show { display: block; }
    .btn {
      width: 100%; padding: 1rem; border: none; border-radius: 10px;
      font-family: 'Oswald', sans-serif; font-size: 1rem;
      font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s; text-decoration: none;
      display: block; text-align: center;
    }
    .btn-start { background: linear-gradient(135deg, var(--primary), #00cc7d); color: var(--bg-dark); }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,157,0.35); }
    .btn-step { background: rgba(0,255,157,0.08); border: 1px solid rgba(0,255,157,0.25); color: var(--primary); }
    .btn-step:hover { background: rgba(0,255,157,0.15); transform: translateY(-2px); }
    .btn-generate { background: linear-gradient(135deg, var(--primary), #6366f1); color: var(--bg-dark); }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,157,0.3); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .key-result { display: none; animation: up 0.4s ease; text-align: center; }
    .key-result.show { display: block; }
    .key-box { background: var(--bg-darker); border: 1px solid var(--success); border-radius: 10px; padding: 1.5rem 1rem; margin-bottom: 0.75rem; }
    .key-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.75rem; }
    .key-value { font-size: 1.3rem; font-weight: 700; color: var(--success); word-break: break-all; line-height: 1.4; }
    .btn-copy { width: 100%; padding: 0.875rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; cursor: pointer; transition: all 0.25s; }
    .btn-copy:hover { border-color: var(--primary); color: var(--primary); }
    .error-msg { display: none; margin-top: 0.75rem; padding: 0.75rem 1rem; background: rgba(255,77,109,0.1); border: 1px solid var(--error); border-radius: 8px; font-size: 0.8rem; color: var(--error); text-align: center; }
    .no-hwid-msg { display: none; margin-top: 0.5rem; padding: 1.25rem 1rem; border-radius: 10px; font-size: 0.85rem; color: var(--text-dim); text-align: center; line-height: 1.6; }
    .no-hwid-msg.show { display: block; }
    .error-msg.show { display: block; }

    .yt-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; padding: 1rem; }
    .yt-modal.show { display: flex; }
    .yt-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; }
    .yt-title { font-family: 'Oswald', sans-serif; font-size: 1.1rem; text-align: center; margin-bottom: 1rem; color: var(--primary); }
    .yt-item { background: var(--bg-darker); border: 1px solid var(--border); border-radius: 10px; padding: 0.875rem 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; }
    .yt-item:hover { border-color: var(--primary); }
    .yt-item.done { border-color: var(--success); color: var(--success); cursor: default; }
    .yt-item.watching { border-color: #6366f1; color: #a5b4fc; cursor: default; }
    .yt-item-label { font-size: 0.875rem; }
    .yt-item-status { font-size: 0.875rem; min-width: 60px; text-align: right; }
    .yt-timer { text-align: center; margin-bottom: 0.75rem; min-height: 24px; display: flex; align-items: center; justify-content: center; }
    .yt-spinner { width: 20px; height: 20px; border: 3px solid rgba(0,255,157,0.2); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .yt-next { width: 100%; padding: 0.875rem; border: none; border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.25s; background: rgba(0,255,157,0.08); border: 1px solid rgba(0,255,157,0.25); color: var(--primary); }
    .yt-next:disabled { opacity: 0.4; cursor: not-allowed; }
    .yt-next:not(:disabled):hover { background: rgba(0,255,157,0.15); transform: translateY(-2px); }

    .captcha-wrap { margin-bottom: 1rem; }
    .captcha-canvas-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    #captchaImg { border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; width: 200px; height: 60px; background: #0d1120; }
    .captcha-refresh { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--text-dim); cursor: pointer; font-size: 1rem; transition: all 0.2s; }
    .captcha-refresh:hover { border-color: var(--primary); color: var(--primary); }
    #captchaInput { width: 100%; padding: 0.75rem 1rem; background: var(--bg-darker); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 1rem; outline: none; letter-spacing: 0.2em; text-align: center; }
    #captchaInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,255,157,0.1); }
    #captchaInput.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(255,77,109,0.1); animation: shake 0.3s ease; }
    #captchaSubmitBtn { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, var(--primary), #00cc7d); color: var(--bg-dark); border: none; border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; margin-top: 0.75rem; }
    #captchaSubmitBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,157,0.35); }
    #captchaSubmitBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="card">
    <h1 class="title">Get Your Key</h1>
    <p class="subtitle" id="domainLabel">Loading...</p>

    <div class="step-block" id="blockStart">
      <button class="btn btn-start" id="btnStart">▶ Start</button>
    </div>
    <div class="step-block" id="blockStep1">
      <button class="btn btn-step" id="btnStep1">Step 1</button>
    </div>
    <div class="step-block" id="blockStep2">
      <button class="btn btn-step" id="btnStep2">Step 2</button>
    </div>
    <div class="step-block" id="blockGenerate">
      <button class="btn btn-generate" id="btnGenerate">Generate Key</button>
    </div>

    <div class="key-result" id="keyResult">
      <div class="key-box">
        <div class="key-label">Your Key</div>
        <div class="key-value" id="keyValue"></div>
      </div>
      <button class="btn-copy" id="btnCopy">Copy Key</button>
      <div id="keyExpiry" style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-dim);text-align:center;font-family:'IBM Plex Mono',monospace;">
        Expires in <span id="expiryTime">--:--:--</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="no-hwid-msg" id="noHwidMsg">
      Your HWID was not found.<br>
      Please launch the script first to get your key.
    </div>
  </div>

  <div class="yt-modal" id="ytModal">
    <div class="yt-box">
      <div class="yt-title" id="ytModalTitle">Watch Videos</div>
      <div id="ytItems"></div>
      <button class="yt-next" id="ytNextBtn" disabled>Next Step</button>
    </div>
  </div>

  <div class="yt-modal" id="captchaModal">
    <div class="yt-box">
      <div class="yt-title">Verify You're Human</div>
      <div class="captcha-wrap">
        <div class="captcha-canvas-row">
          <img id="captchaImg" alt="captcha">
          <button class="captcha-refresh" id="captchaRefreshBtn" title="Refresh">↻</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Enter code above" maxlength="5" autocomplete="off" spellcheck="false">
        <div id="captchaError" style="font-size:0.75rem;color:var(--error);margin-top:0.5rem;min-height:1rem;text-align:center;"></div>
        <button id="captchaSubmitBtn">Verify</button>
      </div>
    </div>
  </div>

  <script type="module">
 const API_BASE = 'https://api.ntt-system.xyz';

const urlParams    = new URLSearchParams(window.location.search);
const hash         = urlParams.get('hash') || '';
const hasValidHash = hash.length > 10;

let domain = urlParams.get('domain') || urlParams.get('id') || localStorage.getItem('ntt_domain') || '';
const flowId = urlParams.get('flow') || localStorage.getItem('ntt_flow') || '';

const hasStartParam = urlParams.has('start_done') || urlParams.has('start');
const hasStep1Param = urlParams.has('step1_done') || urlParams.has('step1');
const hasStep2Param = urlParams.has('step2_done') || urlParams.has('step2');
const hasStepParam  = hasStartParam || hasStep1Param || hasStep2Param;
const isCallback    = hasStepParam && hasValidHash;

let settings = null;

const hwidRaw = urlParams.get('hwid') || '';
let hwid = (hwidRaw.trim().length > 0 && hwidRaw.trim().length <= 50) ? hwidRaw.trim() : null;
if (!hwid) {
  const stored = localStorage.getItem('ntt_hwid') || '';
  hwid = (stored.trim().length > 0 && stored.trim().length <= 50) ? stored.trim() : null;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('show');
}

function show(id) {
  const el = document.getElementById(id);
  el.style.display = '';
  el.classList.add('show');
}

function hide(id) {
  const el = document.getElementById(id);
  el.classList.remove('show');
  el.style.display = '';
}

function resetBlocks() {
  ['blockStart','blockStep1','blockStep2','blockGenerate'].forEach(id => hide(id));
}

let countdownInterval = null;

function startCountdown(secondsLeft) {
  if (countdownInterval) clearInterval(countdownInterval);
  const el = document.getElementById('expiryTime');
  function tick() {
    if (secondsLeft <= 0) {
      el.textContent = 'Expired';
      clearInterval(countdownInterval);
      localStorage.removeItem('ntt_generated_key');
      localStorage.removeItem('ntt_key_domain');
      localStorage.removeItem('ntt_key_hwid');
      localStorage.removeItem('ntt_key_expiry');
      return;
    }
    const h = Math.floor(secondsLeft / 3600);
    const m = Math.floor((secondsLeft % 3600) / 60);
    const s = secondsLeft % 60;
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    secondsLeft--;
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

async function showKey(key, secondsLeft) {
  resetBlocks();
  document.getElementById('keyResult').style.display = '';
  document.getElementById('keyResult').classList.add('show');
  document.getElementById('keyValue').textContent = key;

  if (secondsLeft !== undefined) {
    startCountdown(secondsLeft);
  } else {
    try {
      const r = await fetch(`${API_BASE}/?type=read&hwid=${encodeURIComponent(hwid)}&domain=${encodeURIComponent(domain)}`);
      const d = await r.json();
      startCountdown(d.left || 0);
    } catch {
      startCountdown(0);
    }
  }
}

async function checkExistingKey() {
  if (!hwid || !domain) return false;
  try {
    const r = await fetch(`${API_BASE}/?type=read&hwid=${encodeURIComponent(hwid)}&domain=${encodeURIComponent(domain)}`);
    const d = await r.json();
    if (d.status === 'success' && d.key) {
      await showKey(d.key, d.left || 0);
      return true;
    }
  } catch {}
  return false;
}

async function loadSettings() {
  if (!domain) { showError('No domain specified.'); return; }
  try {
    const flowParam = flowId ? `&flow=${encodeURIComponent(flowId)}` : '';
    const res  = await fetch(`${API_BASE}/?type=get_settings_by_domain&domain=${encodeURIComponent(domain)}${flowParam}`);
    const data = await res.json();
    if (!data.success) { showError('Domain not found.'); return; }

    settings = data.settings;
    document.getElementById('domainLabel').textContent = settings.website_domain;

    hwid = hwid || localStorage.getItem('ntt_hwid') || null;
    if (hwid) localStorage.setItem('ntt_hwid', hwid);
    if (flowId) localStorage.setItem('ntt_flow', flowId);

    if (hwid) {
      const hasKey = await checkExistingKey();
      if (hasKey) return;
    }

    resetBlocks();
    show('blockStart');

    if (hwid) {
      await renderProgress();
    }
  } catch { showError('Failed to load.'); }
}

async function renderProgress() {
  if (!hwid || !settings) return;
  if (document.getElementById('keyResult').classList.contains('show')) return;

  try {
    const flowParam = flowId ? `&flow=${encodeURIComponent(flowId)}` : '';
    const res  = await fetch(`${API_BASE}/?type=progress&hwid=${encodeURIComponent(hwid)}${flowParam}`);
    const data = await res.json();

    resetBlocks();

    if (!data.status) {
      show('blockStart');
      return;
    }

    if (data.step1) {
      if (settings.ad_steps === 2 && !data.step2) {
        show('blockStep2');
      } else {
        show('blockGenerate');
      }
    } else if (data.start) {
      show('blockStep1');
    } else {
      show('blockStart');
    }
  } catch (e) {}
}

let captchaId    = null;
let captchaToken = null;

async function loadCaptcha() {
  if (!hwid) return;
  captchaId    = null;
  captchaToken = null;
  document.getElementById('captchaInput').value = '';
  document.getElementById('captchaError').textContent = '';
  document.getElementById('captchaImg').src = '';
  try {
    const res  = await fetch(`${API_BASE}/?type=captcha_new&hwid=${encodeURIComponent(hwid)}`);
    const data = await res.json();
    if (data.success) {
      captchaId = data.id;
      document.getElementById('captchaImg').src = data.image;
    }
  } catch {}
}


async function verifyCaptcha() {
  const btn    = document.getElementById('captchaSubmitBtn');
  const input  = document.getElementById('captchaInput');
  const errEl  = document.getElementById('captchaError');
  const answer = input.value.trim().toUpperCase();

  if (!answer || answer.length < 5) {
    errEl.textContent = 'Please enter the 5-character code.';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 600);
    return;
  }

  btn.disabled = true; btn.textContent = 'Verifying...';
  errEl.textContent = '';

  try {
    const res  = await fetch(`${API_BASE}/?type=captcha_verify`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: captchaId, answer, hwid }),
    });
    const data = await res.json();

    if (data.success) {
      captchaToken = data.token;
      document.getElementById('captchaModal').classList.remove('show');
      if (settings?.start_type === 'youtube') {
        openYoutubeModal('start', settings.start_yt_links || '[]');
      } else {
        proceedStart();
      }
    } else {
      const msg = data.error === 'Wrong answer' ? 'Incorrect code, try again.' : data.error === 'Captcha expired' ? 'Captcha expired, refreshing...' : 'Invalid captcha, refreshing...';
      errEl.textContent = msg;
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 600);
      await loadCaptcha();
    }
  } catch {
    errEl.textContent = 'Connection error, try again.';
  }

  btn.disabled = false; btn.textContent = 'Verify';
}

function proceedStart() {
  localStorage.setItem('ntt_domain', domain);
  if (hwid) localStorage.setItem('ntt_hwid', hwid);
  if (settings?.start_link) window.open(settings.start_link, '_blank');
}

document.getElementById('btnStart').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.setItem('ntt_domain', domain);
  if (hwid) localStorage.setItem('ntt_hwid', hwid);
  if (!captchaToken) {
    document.getElementById('captchaModal').classList.add('show');
    loadCaptcha();
    return;
  }
  if (settings?.start_type === 'youtube') {
    openYoutubeModal('start', settings.start_yt_links || '[]');
    return;
  }
  proceedStart();
});

document.getElementById('captchaRefreshBtn').addEventListener('click', loadCaptcha);
document.getElementById('captchaSubmitBtn').addEventListener('click', verifyCaptcha);
document.getElementById('captchaInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') verifyCaptcha();
});

function getBypassSeconds(type) {
  if (type === 'lootlab') return 40;
  if (type === 'workink') return 30;
  if (type === 'ads_oder') return 10;
  if (type === 'youtube') return 15;
  return 0;
}

document.getElementById('btnStep1').addEventListener('click', async () => {
  if (!settings) return;
  if (settings.step1_type === 'youtube') {
    openYoutubeModal(1, settings.step1_yt_links || '[]');
    return;
  }
  if (!settings.step1_link) return;
  localStorage.setItem('ntt_domain', domain);
  localStorage.setItem('ntt_hwid', hwid);
  window.open(settings.step1_link, '_blank');

  const wait = getBypassSeconds(settings.step1_type);
  if (wait > 0) {
    await new Promise(r => setTimeout(r, wait * 1000));
  }
  const ok1 = await completeStep(1);
  if (ok1) {
    await renderProgress();
  } else {
    window.location.reload();
  }
});

document.getElementById('btnStep2').addEventListener('click', async () => {
  if (!settings) return;
  if (settings.step2_type === 'youtube') {
    openYoutubeModal(2, settings.step2_yt_links || '[]');
    return;
  }
  if (!settings.step2_link) return;
  localStorage.setItem('ntt_domain', domain);
  localStorage.setItem('ntt_hwid', hwid);
  window.open(settings.step2_link, '_blank');

  const wait = getBypassSeconds(settings.step2_type);
  if (wait > 0) {
    await new Promise(r => setTimeout(r, wait * 1000));
  }
  const ok2 = await completeStep(2);
  if (ok2) {
    await renderProgress();
  } else {
    window.location.reload();
  }
});

let ytWatchedAll = false;

function openYoutubeModal(step, ytLinksJson) {
  let links = [];
  try { links = JSON.parse(ytLinksJson).filter(l => l && l.trim()); } catch {}
  if (!links.length) { showError('No YouTube videos configured.'); return; }

  const modal    = document.getElementById('ytModal');
  const itemsDiv = document.getElementById('ytItems');
  const nextBtn  = document.getElementById('ytNextBtn');
  const titleEl  = document.getElementById('ytModalTitle');

  titleEl.textContent = `Step ${step} — Watch Videos`;
  itemsDiv.innerHTML  = '';
  nextBtn.disabled    = true;
  ytWatchedAll        = false;

  const watched = new Array(links.length).fill(false);
  const timers  = new Array(links.length).fill(null);

  links.forEach((url, i) => {
    const item = document.createElement('div');
    item.className  = 'yt-item';
    item.id         = `ytItem${i}`;
    item.innerHTML  = `<span class="yt-item-label">Like and Comment Video</span><span class="yt-item-status" id="ytSt${i}">Click to watch</span>`;

    item.addEventListener('click', () => {
      if (watched[i] || timers[i]) return;

      item.classList.add('watching');
      document.getElementById(`ytSt${i}`).innerHTML = '<div class="yt-spinner"></div>';
      window.open(url, '_blank');

      let left = 15;
      timers[i] = setInterval(() => {
        left--;
        if (left <= 0) {
          clearInterval(timers[i]);
          timers[i]      = null;
          watched[i]     = true;
          item.classList.remove('watching');
          item.classList.add('done');
          document.getElementById(`ytSt${i}`).textContent = '✓';

          if (watched.every(w => w)) {
            ytWatchedAll     = true;
            nextBtn.disabled = false;
          }
        }
      }, 1000);
    });

    itemsDiv.appendChild(item);
  });

  modal.classList.add('show');

  nextBtn.onclick = async () => {
    if (!ytWatchedAll) return;
    nextBtn.disabled    = true;
    nextBtn.textContent = 'Processing...';

    const ok = await completeStep(step);
    if (ok) {
      if (step === 'start') captchaToken = null;
      modal.classList.remove('show');
      await renderProgress();
    } else {
      window.location.reload();
    }
  };
}

document.getElementById('btnGenerate').addEventListener('click', async () => {
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true; btn.textContent = 'Generating...';
  try {
    const res  = await fetch(`${API_BASE}/?type=create_key`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hwid, domain: settings.website_domain, key_prefix: settings.key_domain, flow_id: flowId || undefined }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.removeItem('ntt_domain');
      localStorage.removeItem('ntt_hwid');
      await showKey(data.key, data.expires_in || 86400);
    } else if (data.error === 'bypass_detected') {
      btn.disabled = false; btn.textContent = 'Generate Key';
      await renderProgress();
    } else {
      showError(data.error || 'Failed.');
      btn.disabled = false; btn.textContent = 'Generate Key';
    }
  } catch {
    showError('Connection error.');
    btn.disabled = false; btn.textContent = 'Generate Key';
  }
});

document.getElementById('btnCopy').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('keyValue').textContent).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = 'Copy Key'; }, 2000);
  });
});

async function completeStep(step) {
  const payload = { hwid, step, hash, domain, flow_id: flowId || undefined, captcha_token: step === 'start' ? captchaToken : undefined };
  try {
    const res = await fetch(`${API_BASE}/?type=complete_step`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    return data.success;
  } catch (e) {
    return false;
  }
}

async function init() {
  if (isCallback) {
    domain = urlParams.get('domain') || localStorage.getItem('ntt_domain') || '';
    hwid   = localStorage.getItem('ntt_hwid');

    if (!domain) { showError('Session lost. Please start over.'); return; }

    localStorage.setItem('ntt_domain', domain);
    localStorage.setItem('ntt_hwid',   hwid);
    if (flowId) localStorage.setItem('ntt_flow', flowId);

    const step = hasStartParam ? 'start' : hasStep1Param ? 1 : 2;
    await completeStep(step);

    const currentPage  = window.location.pathname;
    const flowParam    = flowId ? `&flow=${encodeURIComponent(flowId)}` : '';
    window.location.replace(`${currentPage}?domain=${encodeURIComponent(domain)}${flowParam}`);
    return;
  }

  if (urlParams.get('domain')) localStorage.setItem('ntt_domain', domain);

  if (!domain) { showError('No domain specified.'); return; }

  hwid = hwid || null;

  if (!hwid) {
    // Ẩn hết, chỉ hiện thông báo no hwid
    document.getElementById('domainLabel').style.display = 'none';
    ['blockStart','blockStep1','blockStep2','blockGenerate'].forEach(id => {
      const el = document.getElementById(id);
      el.style.display = 'none';
    });
    document.getElementById('noHwidMsg').classList.add('show');
    return;
  }

  if (hwid) {
    const hasKey = await checkExistingKey();
    if (hasKey) {
      try {
        const flowParam = flowId ? `&flow=${encodeURIComponent(flowId)}` : '';
        const res  = await fetch(`${API_BASE}/?type=get_settings_by_domain&domain=${encodeURIComponent(domain)}${flowParam}`);
        const data = await res.json();
        if (data.success) {
          settings = data.settings;
          document.getElementById('domainLabel').textContent = settings.website_domain;
        }
      } catch {}
      return;
    }
  }

  await loadSettings();
}

init();
  </script>
