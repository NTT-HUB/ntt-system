<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTT HUB - Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00ff9d;
      --primary-dark: #00cc7d;
      --bg-dark: #0a0e1a;
      --bg-darker: #050810;
      --surface: #141824;
      --surface-hover: #1a1f30;
      --text: #e8ecf5;
      --text-dim: #8892ab;
      --error: #ff4d6d;
      --success: #00ff9d;
      --border: #1f2937;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 255, 157, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(99, 102, 241, 0.1), transparent);
      z-index: 0;
      animation: gradientShift 20s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
      50% { opacity: 0.8; transform: scale(1.1) rotate(5deg); }
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeIn 1s ease 0.2s backwards;
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      position: relative;
    }

    .logo p {
      color: var(--text-dim);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Card */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 
        0 0 60px rgba(0, 255, 157, 0.05),
        0 20px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      background: var(--bg-darker);
      padding: 0.5rem;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      padding: 0.875rem;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .tab.active {
      background: var(--surface-hover);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0, 255, 157, 0.2);
    }

    .tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    /* Forms */
    .form-container {
      display: none;
    }

    .form-container.active {
      display: block;
      animation: formSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes formSlide {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--bg-darker);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9375rem;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.1);
    }

    input::placeholder {
      color: var(--text-dim);
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 255, 157, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    /* Messages */
    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: none;
    }

    .message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.error {
      background: rgba(255, 77, 109, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }

    .message.success {
      background: rgba(0, 255, 157, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: var(--bg-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .logo h1 {
        font-size: 2.5rem;
      }

      .auth-card {
        padding: 2rem 1.5rem;
      }

      .container {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>

  <div class="container">
    <div class="auth-wrapper">
      <div class="logo">
        <h1>NTT HUB</h1>
        <p>Community Platform</p>
      </div>

      <div class="auth-card">
        <div class="tabs">
          <button class="tab active" data-tab="login">Login</button>
          <button class="tab" data-tab="register">Register</button>
        </div>

        <div id="message" class="message"></div>

        <!-- Login Form -->
        <form id="loginForm" class="form-container active">
          <div class="form-group">
            <label for="loginUsername">Username / Email</label>
            <input 
              type="text" 
              id="loginUsername" 
              placeholder="Enter username or email" 
              required
              autocomplete="username"
            >
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input 
              type="password" 
              id="loginPassword" 
              placeholder="Enter password" 
              required
              autocomplete="current-password"
            >
          </div>

          <button type="submit" class="btn" id="loginBtn">
            <span>Login</span>
          </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form-container">
          <div class="form-group">
            <label for="registerUsername">Username</label>
            <input 
              type="text" 
              id="registerUsername" 
              placeholder="Choose username" 
              required
              autocomplete="username"
              minlength="3"
              maxlength="15"
            >
          </div>

          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input 
              type="email" 
              id="registerEmail" 
              placeholder="Enter email address" 
              required
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input 
              type="password" 
              id="registerPassword" 
              placeholder="Create password (6-20 chars)" 
              required
              autocomplete="new-password"
              minlength="6"
              maxlength="20"
            >
          </div>

          <button type="submit" class="btn" id="registerBtn">
            <span>Create Account</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import API_BASE from './api-base.js';

    // Tab switching
    const tabs = document.querySelectorAll('.tab');
    const forms = document.querySelectorAll('.form-container');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        
        tabs.forEach(t => t.classList.remove('active'));
        forms.forEach(f => f.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(`${targetTab}Form`).classList.add('active');
        
        hideMessage();
      });
    });

    // Message functions
    function showMessage(text, type = 'error') {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
    }

    function hideMessage() {
      const messageEl = document.getElementById('message');
      messageEl.classList.remove('show');
    }

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!username || !password) {
        showMessage('Please fill in all fields');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span>Logging in<span class="spinner"></span></span>';

      try {
        const response = await fetch(`${API_BASE}/?type=login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          showMessage('Login successful! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = '/dashboard.html'; // Change to your dashboard URL
          }, 1500);
        } else {
          showMessage(data.error || 'Login failed');
          btn.disabled = false;
          btn.innerHTML = '<span>Login</span>';
        }
      } catch (error) {
        showMessage('Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<span>Login</span>';
      }
    });

    // Register handler
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const username = document.getElementById('registerUsername').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const btn = document.getElementById('registerBtn');

      if (!username || !email || !password) {
        showMessage('Please fill in all fields');
        return;
      }

      if (username.length < 3) {
        showMessage('Username must be at least 3 characters');
        return;
      }

      if (username.length > 15) {
        showMessage('Username must be 15 characters or less');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters');
        return;
      }

      if (password.length > 20) {
        showMessage('Password must be 20 characters or less');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span>Creating account<span class="spinner"></span></span>';

      try {
        const response = await fetch(`${API_BASE}/?type=register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          showMessage('Account created successfully! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = '/dashboard.html'; // Change to your dashboard URL
          }, 1500);
        } else {
          showMessage(data.error || 'Registration failed');
          btn.disabled = false;
          btn.innerHTML = '<span>Create Account</span>';
        }
      } catch (error) {
        showMessage('Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span>';
      }
    });

    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
      // Verify token
      fetch(`${API_BASE}/?type=verify`, {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          window.location.href = '/dashboard.html';
        }
      })
      .catch(() => {
        // Token invalid, stay on login page
        localStorage.removeItem('token');
        localStorage.removeItem('user');
      });
    }
  </script>
</body>
</html>
