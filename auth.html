<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTT System — Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:   #00ff9d;
      --green2:  #00cc7a;
      --blue:    #6366f1;
      --dark:    #050810;
      --surface: #111520;
      --border:  #1a2035;
      --text:    #dde3f0;
      --dim:     #5a6580;
      --error:   #ff4d6d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 2rem; overflow-x: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: rgba(0,255,157,0.05); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(99,102,241,0.06); bottom: -100px; right: -100px; }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      animation: up 0.6s cubic-bezier(.16,1,.3,1);
    }
    @keyframes up { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }

    .logo { text-align: center; margin-bottom: 2.5rem; }
    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem; letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--green), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.25em;
      color: var(--dim); text-transform: uppercase; margin-top: 0.4rem;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 2.5rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), var(--blue), transparent);
      opacity: 0.6;
    }

    .tabs {
      display: flex; gap: 0.4rem; margin-bottom: 2rem;
      background: var(--dark); padding: 0.4rem; border-radius: 10px;
    }
    .tab {
      flex: 1; padding: 0.75rem; background: transparent; border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--dim);
      cursor: pointer; border-radius: 7px; transition: all 0.25s;
    }
    .tab.active { background: var(--surface); color: var(--green); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .tab:hover:not(.active) { color: var(--text); }

    .form { display: none; }
    .form.active { display: block; animation: fadein 0.3s ease; }
    @keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block; margin-bottom: 0.4rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--dim);
    }
    .field input {
      width: 100%; padding: 0.875rem 1rem;
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: all 0.2s;
    }
    .field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,255,157,0.08); }
    .field input::placeholder { color: var(--dim); }

    .btn {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: var(--dark); border: none; border-radius: 9px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(0,255,157,0.2); margin-top: 0.5rem;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,255,157,0.35); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .msg {
      display: none; padding: 0.85rem 1rem;
      border-radius: 8px; font-size: 0.875rem; margin-bottom: 1.25rem;
    }
    .msg.show { display: block; animation: fadein 0.3s ease; }
    .msg.error   { background: rgba(255,77,109,0.1); border: 1px solid var(--error); color: var(--error); }
    .msg.success { background: rgba(0,255,157,0.08); border: 1px solid var(--green); color: var(--green); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(5,8,16,0.3); border-top-color: var(--dark);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-left: 0.5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 1.75rem 1.25rem; }
      .logo-name { font-size: 2.75rem; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrapper">
    <div class="logo">
      <div class="logo-name">NTT SYSTEM</div>
      <div class="logo-sub">Key Generator Platform</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <div class="msg" id="msg"></div>

      <form class="form active" id="loginForm">
        <div class="field">
          <label>Username / Email</label>
          <input type="text" id="loginUser" placeholder="Enter username or email" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">Login</button>
      </form>

      <form class="form" id="registerForm">
        <div class="field">
          <label>Username</label>
          <input type="text" id="regUser" placeholder="3–15 characters" minlength="3" maxlength="15" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="6–20 characters" minlength="6" maxlength="20" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn" id="registerBtn">Create Account</button>
      </form>
    </div>
  </div>

  <script type="module">
    const API_BASE = 'https://api.ntt-system.xyz';

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
        hideMsg();
      });
    });

    function showMsg(text, type = 'error') {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type} show`;
    }
    function hideMsg() {
      document.getElementById('msg').className = 'msg';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault(); hideMsg();
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      const btn      = document.getElementById('loginBtn');

      if (!username || !password) { showMsg('Please fill in all fields.'); return; }

      btn.disabled = true;
      btn.innerHTML = 'Logging in <span class="spinner"></span>';

      try {
        const res  = await fetch(`${API_BASE}/?type=login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showMsg('Login successful! Redirecting...', 'success');
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);
        } else {
          showMsg(data.error || 'Login failed.');
          btn.disabled = false; btn.textContent = 'Login';
        }
      } catch {
        showMsg('Connection error. Please try again.');
        btn.disabled = false; btn.textContent = 'Login';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault(); hideMsg();
      const username = document.getElementById('regUser').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPass').value;
      const btn      = document.getElementById('registerBtn');

      if (!username || !email || !password) { showMsg('Please fill in all fields.'); return; }
      if (!/^[a-zA-Z0-9_ ]+$/.test(username)) { showMsg('Username: letters, numbers, spaces, underscore only.'); return; }
      if (username.length < 3)  { showMsg('Username must be at least 3 characters.'); return; }
      if (password.length < 6)  { showMsg('Password must be at least 6 characters.'); return; }

      btn.disabled = true;
      btn.innerHTML = 'Creating account <span class="spinner"></span>';

      try {
        const res  = await fetch(`${API_BASE}/?type=register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showMsg('Account created! Redirecting...', 'success');
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);
        } else {
          showMsg(data.error || 'Registration failed.');
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      } catch {
        showMsg('Connection error. Please try again.');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });

    const token = localStorage.getItem('token');
    if (token) {
      fetch(`${API_BASE}/?type=verify`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(d => { if (d.success) window.location.href = '/dashboard.html'; })
        .catch(() => { localStorage.removeItem('token'); localStorage.removeItem('user'); });
    }
  </script>
</body>
</html>
